name: HK Screener Daily

on:
  schedule:
    # HK 早上 7am (UTC 23:00 前一日)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      skip_ccass:
        description: 'Skip CCASS scrape (faster test run)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          INVESTBOT_PE_PASSPHRASE: ${{ secrets.INVESTBOT_PE_PASSPHRASE }}
        run: |
          if [ "${{ inputs.skip_ccass }}" = "true" ]; then
            python -m hk_screener.pipeline --skip-ccass
          else
            python -m hk_screener.pipeline
          fi

      - name: Commit DB + outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # data.enc.json is gitignored for local dev; force-add the CI-generated one
          git add data/screener.db data/ipo_manual.csv frontend/data_preview.json || true
          git add -f frontend/data.enc.json || true
          git diff --staged --quiet || git commit -m "auto: daily screener update $(date -u +%Y-%m-%d)"
          git push || true

      - name: Build dist/
        run: bash build.sh

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
