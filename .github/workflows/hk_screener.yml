name: HK Screener Daily

on:
  schedule:
    # 香港時間每日早上 7:00 (UTC 23:00 前一日) — HK 收市後幾個鐘 CCASS 已 update
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      skip_ccass:
        description: 'Skip CCASS scrape (faster test run)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install yfinance

      - name: Run pipeline
        run: |
          if [ "${{ inputs.skip_ccass }}" = "true" ]; then
            python -m hk_screener.pipeline --skip-ccass
          else
            python -m hk_screener.pipeline
          fi

      - name: Commit DB + manual CSV updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screener.db data/ipo_manual.csv frontend/data.json || true
          git diff --staged --quiet || git commit -m "auto: daily screener update $(date -u +%Y-%m-%d)"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
