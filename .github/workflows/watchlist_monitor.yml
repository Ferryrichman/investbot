name: HK Watchlist Monitor

on:
  # 唔用 GitHub schedule — 改由 Cloudflare Worker Cron Trigger 精準觸發
  # 每日 09:00 HKT + 15:30 HKT → Worker dispatch workflow
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: send / alert / check / intraday'
        default: 'alert'
        type: choice
        options: [send, alert, check, intraday]

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install requests truststore

      - name: Run Watchlist Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          MODE="${{ inputs.mode }}"
          MODE="${MODE:-alert}"
          echo "Running mode: ${MODE}"
          python hk_watchlist_monitor.py ${MODE}

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 先 commit 再 rebase — 舊版喺 dirty tree 上 pull 必定失敗然後 || true 靜默丟 update
          git add data/watchlist_state.json
          git diff --staged --quiet && { echo "no state changes"; exit 0; } || true
          git commit -m "auto: watchlist state $(date -u +%Y-%m-%d_%H%M)"
          # 同 TG Worker 並發寫入時 retry; conflict 時 -X theirs 保留本 run 嘅完整 state
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase -X theirs || { git rebase --abort; echo "::warning::state rebase conflict, retry $i"; }
            sleep 2
          done
          echo "::warning::git push failed after 3 attempts — state update lost this run"
