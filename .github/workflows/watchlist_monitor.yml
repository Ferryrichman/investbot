name: HK Watchlist Monitor

on:
  # 唔用 GitHub schedule — 改由 Cloudflare Worker Cron Trigger 精準觸發
  # 每日 09:00 HKT + 15:30 HKT → Worker dispatch workflow
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: send / alert / check / intraday'
        default: 'alert'
        type: choice
        options: [send, alert, check, intraday]

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install requests truststore

      - name: Run Watchlist Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          MODE="${{ inputs.mode }}"
          MODE="${MODE:-alert}"
          echo "Running mode: ${MODE}"
          python hk_watchlist_monitor.py ${MODE}

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add data/watchlist_state.json || true
          git diff --staged --quiet || git commit -m "auto: watchlist state $(date -u +%Y-%m-%d_%H%M)"
          git push || true
