name: HK Watchlist Monitor

on:
  schedule:
    # 早上開市前 check (HKT 09:00 = UTC 01:00)
    - cron: '0 1 * * 1-5'    # 週一至週五 09:00 HKT
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: send / alert / check'
        default: 'send'
        type: choice
        options: [send, alert, check]

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install requests truststore

      - name: Run Watchlist Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          MODE="${{ inputs.mode }}"
          python hk_watchlist_monitor.py ${MODE:-alert}

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watchlist_state.json || true
          git diff --staged --quiet || git commit -m "auto: watchlist state $(date -u +%Y-%m-%d_%H%M)"
          git push || true
